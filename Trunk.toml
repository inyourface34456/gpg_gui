[build]
public_url = "/gpg_gui/"
filehash = false

[serve]
no_autoreload = false

[[hooks]]
stage = "post_build"
command = "wasm-snip"
command_arguments = [
    "--snip-rust-panicking-code",
    "dist/.stage/gpg_gui_bg.wasm",
    "-o",
    "dist/.stage/gpg_gui_bg.wasm",
]

[[hooks]]
stage = "post_build"
command = "wasm-opt"
command_arguments = [
    "-Oz",
    "--enable-bulk-memory",
    "--enable-nontrapping-float-to-int",
    "--enable-sign-ext",
    "dist/.stage/gpg_gui_bg.wasm",
    "-o",
    "dist/.stage/gpg_gui_bg.wasm"
]